<!-- templates/exam.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Exam</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    async function checkOne(qid) {
      const input = document.getElementById('ans_' + qid);
      const form = new FormData();
      form.append('answer', input.value);
      const resp = await fetch('/check_question/' + qid, { method: 'POST', body: form});
      const j = await resp.json();
      alert('Your answer: ' + input.value + '\\nCorrect (after rounding): ' + j.correct_value + '\\nIs correct: ' + j.is_correct + (j.note ? '\\nNote: ' + j.note : ''));
    }
  </script>
</head>
<body>
  <h1>Medical Math Mock Exam</h1>
  <form method="post" action="/submit">
  {% for q in exam %}
    <div class="question-block">
      <h3>Question {{q.id}}</h3>
      <p style="white-space: pre-wrap;">{{ q.question }}</p>
      <input id="ans_{{q.id}}" name="{{q.id}}" placeholder="Enter numeric answer" />
      <button type="button" onclick="checkOne({{q.id}})">Check this question</button>
      <hr>
    </div>
  {% endfor %}
    <button type="submit">Submit Full Exam</button>
  </form>
</body>
</html>
