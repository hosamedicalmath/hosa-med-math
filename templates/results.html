<!-- templates/results.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Results</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Results</h1>
  <h2>Score: {{score}} / {{total}}</h2>
  <a href="/generate"><button>Generate New Exam</button></a>
  <hr>
  {% for r in results %}
    <div class="result-block">
      <h3>Q{{r.id}}</h3>
      <p style="white-space: pre-wrap;">{{ r.question }}</p>
      <p><strong>Your answer:</strong> {{ r.user_input }}</p>
      <p><strong>Correct (after rounding):</strong> {{ r.correct_value }}</p>
      <p><strong>Solution:</strong><br><pre style="white-space: pre-wrap;">{{ r.solution }}</pre></p>
      <p><strong>Correct?</strong> {{ 'Yes' if r.is_correct else 'No' }}</p>
      <hr>
    </div>
  {% endfor %}
</body>
</html>
